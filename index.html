// 채널 순서 (역전 방지용)
const CHANNEL_HIERARCHY = [
  '소비자가', '자사몰', '오프라인', '상시할인가', '폐쇄몰',
  '브랜드위크가', '원데이특가', '홈쇼핑', '모바일방송가', '공구가'
];

const CHANNEL_LABELS = {
  '소비자가': '소비자가 (MSRP)',
  '자사몰': '자사몰',
  '오프라인': '오프라인',
  '상시할인가': '상시 할인가',
  '폐쇄몰': '폐쇄몰',
  '브랜드위크가': '브랜드위크',
  '원데이특가': '원데이 특가',
  '홈쇼핑': '홈쇼핑',
  '모바일방송가': '모바일 방송',
  '공구가': '공구가 (Tool Price)'
};

// 포지셔닝 계수
const POSITIONING_FACTORS = {
  'LOW': 8,
  'MID': 11,
  'HIGH': 14,
  'PREMIUM': 17
};

// 세트 프리셋
const SET_PRESETS = [
  { id: 'single', label: '단품', pattern: [1] },
  { id: '124', label: '1/2/4 개입', pattern: [1, 2, 4] },
  { id: '136', label: '1/3/6 개입', pattern: [1, 3, 6] },
  { id: '148', label: '1/4/8 개입', pattern: [1, 4, 8] }
];

// ═══════════════════════════════════════════════════════════════════
// v4.0 가격 계산 엔진
// ═══════════════════════════════════════════════════════════════════

function calculateMSRP(v1, v2, v3, v4, cost) {
  const anchor = v2 ? v2 : v1;
  if (!anchor) return 0;

  const positioningFactor = POSITIONING_FACTORS[v4] || 11;
  let provisional = anchor;

  const minMultiplier = 5.5;
  const costFloor = cost ? cost * minMultiplier : 0;
  provisional = Math.max(provisional, costFloor);

  if (v3 && v3 > 0) {
    const shippingRate = 1.25;
    const premiumRate = 1.10;
    const v3Ceiling = v3 * shippingRate * premiumRate;
    provisional = Math.min(provisional, v3Ceiling);
  }

  return Math.round(provisional / 1000) * 1000;
}

function calculateChannelPrices(msrp, cost, brandName, coreChannel, brandParams) {
  if (!msrp) return {};
  
  const params = brandParams[brandName] || brandParams['기타'];
  const channels = params.channels;
  const toolPriceParams = params.toolPrice;

  const prices = { '소비자가': msrp };

  const baseCoeffs = {
    '자사몰': 0.92,
    '오프라인': 0.90,
    '상시할인가': channels['상시할인가'] || 0.87,
    '폐쇄몰': 0.83,
    '브랜드위크가': channels['브랜드위크가'] || 0.76,
    '원데이특가': 0.74,
    '홈쇼핑': channels['홈쇼핑'] || 0.68,
    '모바일방송가': channels['모바일방송가'] || 0.72
  };

  const costBased = cost ? (cost * toolPriceParams.marginMultiplier) / (1 - toolPriceParams.platformFee) : 0;
  const msrpBased = msrp * toolPriceParams.msrpFloor;
  prices['공구가'] = Math.round(Math.max(costBased, msrpBased) / 1000) * 1000;

  // 기본 채널 가격 계산
  for (const [ch, coeff] of Object.entries(baseCoeffs)) {
    prices[ch] = Math.round((msrp * coeff) / 1000) * 1000;
  }

  // 핵심채널 로직: 핵심채널을 기준으로 모든 채널 상향 조정
  if (coreChannel && coreChannel !== '소비자가' && prices[coreChannel]) {
    const coreChannelIndex = CHANNEL_HIERARCHY.indexOf(coreChannel);
    const coreChannelPrice = prices[coreChannel];
    
    // 핵심채널보다 위에 있는 채널들 (더 비싼 채널들)
    // 핵심채널 대비 최소 3-5% 더 비싸게 조정
    for (let i = coreChannelIndex - 1; i >= 1; i--) {
      const currentChannel = CHANNEL_HIERARCHY[i];
      const nextChannel = CHANNEL_HIERARCHY[i + 1];
      
      if (prices[currentChannel] && prices[nextChannel]) {
        const minGapFromCore = 0.03; // 3% 최소 간격
        const minPrice = Math.round((prices[nextChannel] * (1 + minGapFromCore)) / 1000) * 1000;
        
        // 다음 채널보다 낮거나 간격이 좁으면 상향 조정
        if (prices[currentChannel] < minPrice) {
          prices[currentChannel] = minPrice;
        }
      }
    }
    
    // 핵심채널보다 아래에 있는 채널들 (더 할인된 채널들)
    // 핵심채널 가격보다 높으면 모두 상향 조정 (핵심채널을 최저가로)
    for (let i = coreChannelIndex + 1; i < CHANNEL_HIERARCHY.length; i++) {
      const currentChannel = CHANNEL_HIERARCHY[i];
      
      if (prices[currentChannel]) {
        // 핵심채널보다 낮거나 같으면 핵심채널 가격으로 상향
        if (prices[currentChannel] <= coreChannelPrice) {
          // 공구가는 별도 로직이므로 제외
          if (currentChannel !== '공구가') {
            prices[currentChannel] = coreChannelPrice;
          }
        }
        // 핵심채널보다 비싸면 그대로 유지하되 최소 간격 확보
        else {
          const minGap = 0.02; // 2% 최소 간격
          const minPrice = Math.round((coreChannelPrice * (1 + minGap)) / 1000) * 1000;
          if (prices[currentChannel] < minPrice) {
            prices[currentChannel] = minPrice;
          }
        }
      }
    }
  }

  // 채널 역전 방지 (최종 검증)
  const sortedChannels = [...CHANNEL_HIERARCHY];
  for (let i = 1; i < sortedChannels.length; i++) {
    const current = sortedChannels[i];
    const prev = sortedChannels[i - 1];
    if (prices[current] && prices[prev] && prices[current] > prices[prev]) {
      prices[current] = prices[prev];
    }
  }

  return prices;
}

function calculateSetPrices(items, brandName, brandParams, isGiftSet = false) {
  if (!items.length) return {};

  const params = brandParams[brandName] || brandParams['기타'];
  if (!params) {
    console.error('브랜드 파라미터를 찾을 수 없습니다:', brandName);
    return {};
  }
  
  const totalQty = items.reduce((sum, item) => sum + item.quantity, 0);
  
  // 선물세트 여부에 따라 할인율 선택 (안전하게 체크)
  const discountTable = isGiftSet ? 
    (params.giftSetDisc || params.bundleDisc || {}) : 
    (params.bundleDisc || {});
  
  const bundleDiscRate = discountTable[totalQty] || 
    discountTable[Math.max(...Object.keys(discountTable).map(Number))] || 
    0;

  const setPrices = {};

  const sumMSRP = items.reduce((sum, item) => sum + item.msrp * item.quantity, 0);
  setPrices['소비자가'] = Math.round((sumMSRP * (1 - bundleDiscRate)) / 1000) * 1000;

  for (const ch of CHANNEL_HIERARCHY) {
    if (ch === '소비자가') continue;
    
    const sumChannel = items.reduce((sum, item) => {
      const chPrice = item.channelPrices[ch] || item.msrp;
      return sum + chPrice * item.quantity;
    }, 0);

    setPrices[ch] = Math.round((sumChannel * (1 - bundleDiscRate)) / 1000) * 1000;
  }

  for (let i = 1; i < CHANNEL_HIERARCHY.length; i++) {
    const current = CHANNEL_HIERARCHY[i];
    const prev = CHANNEL_HIERARCHY[i - 1];
    if (setPrices[current] && setPrices[prev] && setPrices[current] > setPrices[prev]) {
      setPrices[current] = setPrices[prev];
    }
  }

  return setPrices;
}

// ═══════════════════════════════════════════════════════════════════
// 메인 앱 컴포넌트
// ═══════════════════════════════════════════════════════════════════

function App() {
  const [activeTab, setActiveTab] = useState('data');
  const [brandParams, setBrandParams] = useState(() => {
    const saved = localStorage.getItem('brandParams_v4');
    let params = saved ? JSON.parse(saved) : DEFAULT_BRAND_PARAMS;
    
    // 마이그레이션: giftSetDisc 필드가 없으면 추가
    let needsUpdate = false;
    Object.keys(params).forEach(brandName => {
      if (!params[brandName].giftSetDisc) {
        console.log(`🔧 ${brandName}에 giftSetDisc 추가`);
        params[brandName].giftSetDisc = DEFAULT_BRAND_PARAMS[brandName]?.giftSetDisc || 
          DEFAULT_BRAND_PARAMS['기타'].giftSetDisc;
        needsUpdate = true;
      }
    });
    
    if (needsUpdate) {
      localStorage.setItem('brandParams_v4', JSON.stringify(params));
      console.log('✅ brandParams 마이그레이션 완료');
    }
    
    return params;
  });
  const [productMaster, setProductMaster] = useState(() => {
    const saved = localStorage.getItem('productMaster_v41');
    return saved ? JSON.parse(saved) : SAMPLE_PRODUCTS;
  });

  // Excel에서 로드된 브랜드 목록 추출
  const availableBrands = useMemo(() => {
    const brandsFromProducts = [...new Set(productMaster.map(p => p.brand).filter(b => b))];
    
    // 기존 brandParams의 브랜드와 병합
    const allBrands = [...new Set([...Object.keys(brandParams), ...brandsFromProducts])];
    
    // '기타'를 맨 뒤로
    return allBrands.filter(b => b !== '기타').sort().concat(['기타']);
  }, [productMaster, brandParams]);

  // productMaster 변경 시 새로운 브랜드의 기본 파라미터 추가
  useEffect(() => {
    const newBrands = availableBrands.filter(brand => !brandParams[brand] && brand !== '기타');
    
    if (newBrands.length > 0) {
      const updatedParams = { ...brandParams };
      newBrands.forEach(brand => {
        updatedParams[brand] = { ...DEFAULT_BRAND_PARAMS['기타'] };
      });
      setBrandParams(updatedParams);
    }
  }, [availableBrands]);

  useEffect(() => {
    localStorage.setItem('brandParams_v4', JSON.stringify(brandParams));
  }, [brandParams]);

  useEffect(() => {
    localStorage.setItem('productMaster_v41', JSON.stringify(productMaster));
    console.log('🔄 Product Master Updated:', productMaster.length, 'products');
    console.log('Products:', productMaster.slice(0, 3).map(p => `${p.sku} - ${p.name}`));
  }, [productMaster]);

  // 초기 로드 디버깅
  useEffect(() => {
    console.log('🚀 App Initialized');
    console.log('📦 Product Master:', productMaster.length, 'products');
    console.log('🏷️ Available Brands:', availableBrands);
    console.log('💾 localStorage keys:', Object.keys(localStorage));

  const tabs = [
    { id: 'data', icon: '📂', label: '데이터 관리' },
    { id: 'pricing', icon: '💰', label: '가격 산출' },
    { id: 'set', icon: '📦', label: '세트 구성' },
    { id: 'brand', icon: '🎯', label: '브랜드 계수' },
    { id: 'compare', icon: '📊', label: '시나리오 비교' }

  return (
    <div style={{minHeight:'100vh',padding:'24px'}}>
      <div style={{maxWidth:'1400px',margin:'0 auto'}}>

            <h1 style={{fontSize:'28px',fontWeight:'700',marginBottom:'4px'}}>
              브랜드 가격 결정 시스템
              <span className="badge badge-primary" style={{marginLeft:'12px',fontSize:'13px'}}>v4.1</span>
              {productMaster.length > 0 && (
                <span className="badge badge-success" style={{marginLeft:'8px',fontSize:'13px'}}>
                  제품 {productMaster.length}개 로드됨
                </span>
              )}

            <p className="text-gray text-sm">Excel 업로드 + 자동 세트 구성 + 4변수 앵커</p>

            <span className="badge badge-success">±10% 매치율 92.5%</span>

// ═══════════════════════════════════════════════════════════════════
// 탭0: 데이터 관리 (Excel 업로드)
// ═══════════════════════════════════════════════════════════════════

function DataTab({ productMaster, setProductMaster }) {
  const [dragOver, setDragOver] = useState(false);
  const [loading, setLoading] = useState(false);
  const [preview, setPreview] = useState([]);
  const [excelHeaders, setExcelHeaders] = useState([]);
  const [columnMapping, setColumnMapping] = useState({ sku: -1, name: -1, brand: -1, cost: -1, msrp: -1 });
  const [showMapping, setShowMapping] = useState(false);
  const [rawData, setRawData] = useState([]);
  const fileInputRef = useRef(null);

  const handleFileSelect = async (file) => {
    if (!file) return;
    
    setLoading(true);
    try {
      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data);
      const sheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[sheetName];
      const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

      // 헤더 찾기 (개선된 로직)
      let headerRow = -1;
      let maxKeywords = 0;
      
      for (let i = 0; i < Math.min(15, jsonData.length); i++) {
        const row = jsonData[i];
        if (!row || row.length === 0) continue;
        
        let keywordCount = 0;
        const rowStr = row.map(c => String(c || '').toLowerCase()).join(' ');
        
        if (rowStr.includes('sku') || rowStr.includes('코드')) keywordCount++;
        if (rowStr.includes('상품') || rowStr.includes('품명') || rowStr.includes('제품')) keywordCount++;
        if (rowStr.includes('브랜드')) keywordCount++;
        if (rowStr.includes('원가') || rowStr.includes('vat') || rowStr.includes('cost')) keywordCount++;
        if (rowStr.includes('소비자') || rowStr.includes('msrp') || rowStr.includes('정가')) keywordCount++;
        
        if (keywordCount > maxKeywords) {
          maxKeywords = keywordCount;
          headerRow = i;
        }
      }

      if (headerRow === -1) {
        alert('⚠️ 헤더를 찾을 수 없습니다. 첫 번째 행을 헤더로 사용합니다.');
        headerRow = 0;
      }

      const headers = jsonData[headerRow].map(h => String(h || '').trim());
      const rows = jsonData.slice(headerRow + 1).filter(row => row && row.length > 0);

      // 자동 컬럼 매핑
      const autoMapping = {
        sku: headers.findIndex(h => {
          const hl = h.toLowerCase();
          return hl.includes('sku') || hl.includes('코드') || hl.includes('품번');
        }),
        name: headers.findIndex(h => {
          const hl = h.toLowerCase();
          return hl.includes('상품') || hl.includes('품명') || hl.includes('제품명');
        }),
        brand: headers.findIndex(h => {
          const hl = h.toLowerCase();
          return hl.includes('브랜드');
        }),
        cost: headers.findIndex(h => {
          const hl = h.toLowerCase();
          return (hl.includes('원가') && hl.includes('vat')) || 
                 (hl.includes('원가') && hl.includes('+')) ||
                 hl.includes('원가(vat');
        }),
        msrp: headers.findIndex(h => {
          const hl = h.toLowerCase();
          return hl.includes('소비자') || hl.includes('msrp') || hl.includes('정가');
        })
      };

      // 원가(VAT+)를 못 찾으면 일반 원가로 대체
      if (autoMapping.cost === -1) {
        autoMapping.cost = headers.findIndex(h => {
          const hl = h.toLowerCase();
          return hl.includes('원가') || hl.includes('cost');
        });
      }

      setExcelHeaders(headers);
      setRawData(rows);
      setColumnMapping(autoMapping);
      
      // 매핑 확인이 필요한 경우
      const missingFields = Object.entries(autoMapping).filter(([k, v]) => v === -1).map(([k]) => k);
      
      if (missingFields.length > 0) {
        setShowMapping(true);
        alert(`⚠️ 일부 컬럼을 자동으로 찾지 못했습니다: ${missingFields.join(', ')}\n컬럼 매핑을 확인해주세요.`);
      } else {
        // 자동 매핑 성공 시 바로 적용
        applyMapping(autoMapping, rows);
      }
    } catch (err) {
      alert(`❌ 파일 읽기 실패: ${err.message}`);
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  const applyMapping = (mapping, rows) => {
    const products = rows
      .filter(row => row && row.length > 0 && (mapping.sku >= 0 ? row[mapping.sku] : true))
      .map((row, idx) => {
        const sku = mapping.sku >= 0 ? row[mapping.sku] : `ITEM_${idx}`;
        const name = mapping.name >= 0 ? row[mapping.name] : '';
        const brand = mapping.brand >= 0 ? row[mapping.brand] : '';
        const cost = mapping.cost >= 0 ? parseFloat(String(row[mapping.cost]).replace(/,/g, '')) || 0 : 0;
        const msrp = mapping.msrp >= 0 ? parseFloat(String(row[mapping.msrp]).replace(/,/g, '')) || 0 : 0;
        
        return {
          id: String(sku),
          sku: String(sku),
          name: String(name),
          brand: String(brand),
          cost,
          msrp
        };
      })
      .filter(p => p.sku && (p.name || p.cost || p.msrp));

    setProductMaster(products);
    setPreview(products.slice(0, 10));
    setShowMapping(false);
    alert(`✅ ${products.length}개 제품을 로드했습니다!`);
  };

  const confirmMapping = () => {
    applyMapping(columnMapping, rawData);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFileSelect(file);
  };

  const clearData = () => {
    if (confirm('모든 제품 데이터를 삭제하시겠습니까?')) {
      setProductMaster([]);
      setPreview([]);
    }
  };

  return (
    <div>
      <div className="card mb-4">
        <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>
          📂 Excel 파일 업로드
        </h2>
        
        <div
          className={`file-upload ${dragOver ? 'dragover' : ''}`}
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={handleDrop}
          onClick={() => fileInputRef.current?.click()}
        >
          <input
            ref={fileInputRef}
            type="file"
            accept=".xlsx,.xls"
            onChange={(e) => handleFileSelect(e.target.files[0])}
          />
          <div style={{fontSize:'48px',marginBottom:'12px'}}>📊</div>
          <div style={{fontSize:'16px',fontWeight:'600',marginBottom:'8px'}}>
            {loading ? '파일 읽는 중...' : 'Excel 파일을 드래그하거나 클릭하여 선택'}
          </div>
          <div className="text-sm text-gray">
            지원 형식: .xlsx, .xls | SKU, 상품명, 브랜드, 원가, 소비자가 컬럼 필요
          </div>
        </div>

        <div className="flex justify-between items-center mt-4">
          <div className="text-sm font-semibold">
            {productMaster.length > 0 ? (
              <span className="text-success">✅ 총 {productMaster.length}개 제품 로드됨</span>
            ) : (
              <span className="text-danger">⚠️ 제품 없음</span>
            )}
          </div>
          <div className="flex gap-2">
            {productMaster.length === 0 && (
              <button 
                className="btn-primary" 
                onClick={() => {
                  setProductMaster(SAMPLE_PRODUCTS);
                  localStorage.setItem('productMaster_v41', JSON.stringify(SAMPLE_PRODUCTS));
                  alert('✅ 샘플 데이터 5개를 로드했습니다!');
                }}
              >
                📦 샘플 데이터 로드
              </button>
            )}
            {productMaster.length > 0 && (
              <button className="btn-danger" onClick={clearData}>
                🗑️ 데이터 초기화
              </button>
            )}
          </div>
        </div>
      </div>

      {showMapping && excelHeaders.length > 0 && (
        <div className="card mt-4">
          <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>
            🔧 컬럼 매핑 확인
          </h2>
          <div className="text-sm text-gray mb-3">
            Excel 파일의 각 컬럼이 어떤 데이터인지 확인하고 조정하세요
          </div>
          
          <div className="grid" style={{gridTemplateColumns:'repeat(5, 1fr)',gap:'12px',marginBottom:'16px'}}>
            <div>
              <label className="label">SKU/품번</label>
              <select className="input-field" value={columnMapping.sku} onChange={e => setColumnMapping({...columnMapping, sku: parseInt(e.target.value)})}>
                <option value="-1">— 없음 —</option>
                {excelHeaders.map((h, idx) => (
                  <option key={idx} value={idx}>{h || `컬럼 ${idx+1}`}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="label">상품명 *</label>
              <select className="input-field" value={columnMapping.name} onChange={e => setColumnMapping({...columnMapping, name: parseInt(e.target.value)})}>
                <option value="-1">— 없음 —</option>
                {excelHeaders.map((h, idx) => (
                  <option key={idx} value={idx}>{h || `컬럼 ${idx+1}`}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="label">브랜드</label>
              <select className="input-field" value={columnMapping.brand} onChange={e => setColumnMapping({...columnMapping, brand: parseInt(e.target.value)})}>
                <option value="-1">— 없음 —</option>
                {excelHeaders.map((h, idx) => (
                  <option key={idx} value={idx}>{h || `컬럼 ${idx+1}`}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="label">원가(VAT+)</label>
              <select className="input-field" value={columnMapping.cost} onChange={e => setColumnMapping({...columnMapping, cost: parseInt(e.target.value)})}>
                <option value="-1">— 없음 —</option>
                {excelHeaders.map((h, idx) => (
                  <option key={idx} value={idx}>{h || `컬럼 ${idx+1}`}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="label">소비자가</label>
              <select className="input-field" value={columnMapping.msrp} onChange={e => setColumnMapping({...columnMapping, msrp: parseInt(e.target.value)})}>
                <option value="-1">— 없음 —</option>
                {excelHeaders.map((h, idx) => (
                  <option key={idx} value={idx}>{h || `컬럼 ${idx+1}`}</option>
                ))}
              </select>
            </div>
          </div>

          <div className="flex gap-2">
            <button className="btn-success" style={{flex:1}} onClick={confirmMapping}>
              ✅ 매핑 확인 및 데이터 로드
            </button>
            <button className="btn-secondary" onClick={() => setShowMapping(false)}>
              취소
            </button>
          </div>
        </div>
      )}

      {preview.length > 0 && (
        <div className="card">
          <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'16px'}}>
            📋 미리보기 (최대 10개)
          </h2>
          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>상품명</th>
                <th>브랜드</th>
                <th style={{textAlign:'right'}}>원가</th>
                <th style={{textAlign:'right'}}>소비자가</th>
              </tr>
            </thead>
            <tbody>
              {preview.map(product => (
                <tr key={product.id}>
                  <td className="font-semibold">{product.sku}</td>
                  <td>{product.name}</td>
                  <td><span className="badge badge-primary">{product.brand}</span></td>
                  <td style={{textAlign:'right'}}>{product.cost ? product.cost.toLocaleString() : '—'}</td>
                  <td style={{textAlign:'right',fontWeight:'600'}}>{product.msrp ? product.msrp.toLocaleString() : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// 탭1: 가격 산출 (기존과 유사하지만 제품 선택 추가)
// ═══════════════════════════════════════════════════════════════════

function PricingTab({ brandParams, productMaster, availableBrands }) {
  const [selectedProduct, setSelectedProduct] = useState('');
  const [productSearchText, setProductSearchText] = useState('');
  const [showProductDropdown, setShowProductDropdown] = useState(false);
  const [v1, setV1] = useState(50000);
  const [v2, setV2] = useState('');
  const [v3, setV3] = useState('');
  const [v4, setV4] = useState('MID');
  const [cost, setCost] = useState(8000);
  const [brandName, setBrandName] = useState('라메종드미엘');
  const [coreChannel, setCoreChannel] = useState('');
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  // 제품 선택 시 자동 입력
  useEffect(() => {
    if (selectedProduct) {
      const product = productMaster.find(p => p.id === selectedProduct);
      if (product) {
        if (product.cost) setCost(product.cost);
        if (product.msrp) setV2(product.msrp);
        if (product.brand) {
          const brandMatch = Object.keys(brandParams).find(b => 
            product.brand.includes(b) || b.includes(product.brand)
          );
          if (brandMatch) setBrandName(brandMatch);
        }
      }
    }
  }, [selectedProduct, productMaster, brandParams]);

  const msrp = useMemo(() => 
    calculateMSRP(v1, parseFloat(v2) || 0, parseFloat(v3) || 0, v4, cost),
    [v1, v2, v3, v4, cost]
  );

  const channelPrices = useMemo(() => 
    calculateChannelPrices(msrp, cost, brandName, coreChannel, brandParams),
    [msrp, cost, brandName, coreChannel, brandParams]
  );

  const anchor = useMemo(() => (v2 ? parseFloat(v2) : v1), [v1, v2]);
  const v3Ceiling = useMemo(() => {
    const v3Num = parseFloat(v3);
    return v3Num ? Math.round(v3Num * 1.25 * 1.10 / 1000) * 1000 : null;
  }, [v3]);

  useEffect(() => {
    if (!chartRef.current || !msrp) return;

    const ctx = chartRef.current.getContext('2d');
    
    if (chartInstance.current) {
      chartInstance.current.destroy();
    }

    const labels = CHANNEL_HIERARCHY.filter(ch => channelPrices[ch]);
    const data = labels.map(ch => channelPrices[ch]);
    const colors = labels.map(ch => 
      ch === coreChannel ? '#00D4AA' : (ch === '공구가' ? '#FFD166' : '#6C63FF')
    );

    chartInstance.current = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels.map(ch => CHANNEL_LABELS[ch]),
        datasets: [{
          label: '채널가 (원)',
          data: data,
          backgroundColor: colors,
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1A1D2E',
            titleColor: '#E8EAF6',
            bodyColor: '#E8EAF6',
            borderColor: '#3A3D5C',
            borderWidth: 1,
            padding: 12,
            displayColors: false,
            callbacks: {
              label: (ctx) => `${ctx.parsed.y.toLocaleString()}원`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: '#2A2D42' },
            ticks: { 
              color: '#9E9EBE',
              callback: (val) => (val / 1000).toFixed(0) + 'k'
            }
          },
          x: {
            grid: { display: false },
            ticks: { color: '#9E9EBE', font: { size: 11 } }
          }
        }
      }
    });

    return () => {
      if (chartInstance.current) {
        chartInstance.current.destroy();
      }
    };
  }, [channelPrices, coreChannel, msrp]);

  return (
    <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
      <div className="card">
        <h2 style={{fontSize:'18px',fontWeight:'600',marginBottom:'20px'}}>📥 입력 변수</h2>
        
        <div className="mb-4">
          <label className="label">
            제품 검색 (선택사항)
            {productMaster.length === 0 && (
              <span className="text-danger" style={{marginLeft:'8px',fontSize:'11px'}}>⚠️ 제품 없음</span>
            )}
          </label>
          {productMaster.length === 0 ? (
            <input 
              className="input-field" 
              disabled 
              placeholder="데이터 관리 탭에서 Excel 파일을 먼저 업로드하세요"
            />
          ) : (
            <div style={{position:'relative'}}>
              <input
                className="input-field"
                placeholder="상품코드 또는 상품명으로 검색... (예: F030 또는 라벤더)"
                value={productSearchText}
                onChange={e => {
                  const value = e.target.value;
                  setProductSearchText(value);
                  setShowProductDropdown(true);
                  
                  if (!value) {
                    setSelectedProduct('');
                  }
                }}
                onFocus={() => setShowProductDropdown(true)}
                onBlur={() => {
                  setTimeout(() => setShowProductDropdown(false), 200);
                }}
              />
              {showProductDropdown && productSearchText && (
                <div style={{
                  position:'absolute',
                  top:'100%',
                  left:0,
                  right:0,
                  maxHeight:'250px',
                  overflowY:'auto',
                  background:'#1A1D2E',
                  border:'1px solid #6C63FF',
                  borderRadius:'8px',
                  marginTop:'4px',
                  zIndex:1000,
                  boxShadow:'0 4px 12px rgba(0,0,0,0.3)'
                }}>
                  {productMaster
                    .filter(p => {
                      const searchLower = productSearchText.toLowerCase();
                      return p.sku.toLowerCase().includes(searchLower) ||
                             p.name.toLowerCase().includes(searchLower);
                    })
                    .slice(0, 15)
                    .map(p => (
                      <div
                        key={p.id}
                        style={{
                          padding:'12px 14px',
                          cursor:'pointer',
                          borderBottom:'1px solid #2A2D42',
                          transition:'background 0.2s'
                        }}
                        onMouseDown={() => {
                          setSelectedProduct(p.id);
                          setProductSearchText(`[${p.sku}] [${p.name}]`);
                          setShowProductDropdown(false);
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = '#22263A'}
                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                      >
                        <div style={{fontSize:'13px',fontWeight:'600',marginBottom:'4px',color:'#E8EAF6'}}>
                          <span style={{color:'#6C63FF'}}>[{p.sku}]</span> [{p.name}]
                        </div>
                        <div style={{fontSize:'11px',color:'#9E9EBE'}}>
                          {p.brand} | 원가: {p.cost?.toLocaleString()}원 | MSRP: {p.msrp?.toLocaleString()}원
                        </div>
                      </div>
                    ))}
                  {productMaster.filter(p => {
                    const searchLower = productSearchText.toLowerCase();
                    return p.sku.toLowerCase().includes(searchLower) ||
                           p.name.toLowerCase().includes(searchLower);
                  }).length === 0 && (
                    <div style={{padding:'20px',textAlign:'center',color:'#6B6E8C'}}>

                    </div>
                  )}

              )}

            <div className="text-xs text-danger mt-1">💡 데이터 관리 탭에서 Excel 파일을 업로드하면 제품 목록이 나타납니다</div>
          )}
        </div>

        <div className="mb-4">
          <label className="label">
            브랜드
            {availableBrands && availableBrands.length > Object.keys(DEFAULT_BRAND_PARAMS).length && (

                ✓ Excel에서 {availableBrands.length - Object.keys(DEFAULT_BRAND_PARAMS).length}개 추가됨
              </span>
            )}
          </label>
          <select className="input-field" value={brandName} onChange={e => setBrandName(e.target.value)}>
            {(availableBrands || Object.keys(brandParams)).map(brand => (
